<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Command Centre</title>
    <meta name="description" content="Daily-driver dashboard for PhD and income work" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap"
    />
    <script>
      // Theme bootstrap — runs before React mounts to avoid a flash of the
      // wrong theme. Reads the same localStorage key + shape as useSettings.js.
      (function () {
        try {
          var KEY = 'command-centre-settings';
          var raw = localStorage.getItem(KEY);
          var s = raw ? JSON.parse(raw) : {};
          var pref = s.theme || 'dark';
          var effective = pref === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : pref;
          if (effective === 'dark') document.documentElement.classList.add('dark');
          if (s.accent) document.documentElement.dataset.accent = s.accent;
        } catch (e) { /* fall back to default no-class */ }
      })();
    </script>
  </head>
  <body class="bg-zinc-50 dark:bg-zinc-950">
